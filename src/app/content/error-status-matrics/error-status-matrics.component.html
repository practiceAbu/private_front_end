<div class="error-metrics">

  <div class="subtitle">Error Metrics</div>

  <div 
    class="metric-row"
    *ngFor="let metric of errorMetrics"
  >
    <div class="left">
      <div class="icon"></div>

      <div class="text">
        <div class="value">{{ metric.value }}</div>
        <div class="label">{{ metric.label }}</div>
      </div>
    </div>

  
  </div>



</div>
