<div class="error-metric " >
  <h2 class="subtitle">Error Metrics</h2>

  <div class="metric-item"  *ngFor="let metric of errorMetrics">
    <div class="icon list"></div>
    <div>
      <div class="metric-value small">{{ metric.value }}</div>
      <div class="metric-label">{{ metric.label }}</div>
    </div>
  </div>

</div>
